<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141026"/>
      <stop offset="1" stop-color="#07060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#07060f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="needle" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#fef9c3"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- guide rings -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- four higher-order quadrant dots -->
  <circle cx="256" cy="106" r="13" fill="#34d399"/>            <!-- transcendence -->
  <circle cx="106" cy="256" r="13" fill="#38bdf8"/>            <!-- openness -->
  <circle cx="256" cy="406" r="13" fill="#fb7185"/>            <!-- enhancement -->
  <circle cx="406" cy="256" r="13" fill="#818cf8"/>            <!-- conservation -->

  <!-- profile blob -->
  <path d="M256 140 C330 150 372 196 366 256 C360 320 312 360 256 366 C196 372 150 326 146 256 C142 200 190 150 256 140 Z"
        fill="#5eead4" fill-opacity="0.16" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="3"/>

  <!-- compass needle pointing toward transcendence -->
  <g filter="url(#soft)" opacity="0.7">
    <line x1="256" y1="256" x2="256" y2="150" stroke="url(#needle)" stroke-width="10" stroke-linecap="round"/>
  </g>
  <line x1="256" y1="256" x2="256" y2="150" stroke="url(#needle)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="150" r="11" fill="#fef9c3"/>
  <circle cx="256" cy="256" r="7" fill="#eef0ff"/>
</svg>
