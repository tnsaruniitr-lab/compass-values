  <canvas id="stars" aria-hidden="true"></canvas>

    <span class="theme-ic" aria-hidden="true">✶</span>

    <noscript>
      <section class="view"><div class="card">
        <h1>Compass — an honest values test</h1>
        <p>Compass maps your personal values on the Schwartz circumplex: you rank ten basic human values,
        then confirm them through forced trade-offs, and the app shows where your two answers agree —
        with visible confidence instead of a personality type. It runs entirely in your browser and
        needs JavaScript enabled.</p>
